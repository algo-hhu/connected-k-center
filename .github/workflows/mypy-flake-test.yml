name: Q&A and Tests

on:
  push:
    branches:
      - main
    paths:
      - "connected_k_center/**"
      - "tests/**"
      - "build_extension.py"
      - "pyproject.toml"
      - "poetry.lock"
  pull_request:
    paths:
      - "connected_k_center/**"
      - "tests/**"
      - "build_extension.py"
      - "pyproject.toml"
      - "poetry.lock"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Boost.Graph headers are needed to compile the C++ extension.
      - name: Install Boost
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - name: Install poetry
        run: pipx install poetry==2.3.2

      - name: Install dependencies (builds the C++ extension)
        run: poetry install --with dev,test

      - name: Run MyPy
        run: poetry run mypy --install-types --non-interactive connected_k_center

      - name: Run Flake8
        run: poetry run flake8 connected_k_center/ tests/

      - name: Run Tests
        run: poetry run python -m unittest discover tests -v
